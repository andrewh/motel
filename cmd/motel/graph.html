<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GRAPH_TITLE - motel topology</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.11.3/lib/p5.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background: #fafafa; }
  canvas { display: block; }
  #legend {
    position: fixed; top: 12px; left: 12px;
    font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
    font-size: 12px; color: #444;
    background: rgba(255, 255, 255, 0.9);
    border: 1px solid #ddd; border-radius: 6px;
    padding: 8px 12px; pointer-events: none;
  }
  #legend .title { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
  #legend .hint { color: #888; margin-top: 4px; }
  #timebar {
    position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
    display: none; align-items: center; gap: 10px;
    width: min(640px, 85vw);
    font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
    font-size: 12px; color: #444;
    background: rgba(255, 255, 255, 0.95);
    border: 1px solid #ddd; border-radius: 6px;
    padding: 8px 14px; z-index: 10;
  }
  #timebar input[type=range] { flex: 1; }
  #timebar button {
    border: 1px solid #ccc; border-radius: 4px; background: white;
    font-size: 12px; width: 28px; cursor: pointer;
  }
  #timebar #timelabel { min-width: 90px; text-align: right; color: #666; }
</style>
</head>
<body>
<div id="legend">
  <div class="title">GRAPH_TITLE</div>
  <div>&#9632; entry point &nbsp; &#9633; service &nbsp; &#8943; async call</div>
  <div class="hint">hover a service for operations</div>
  <div class="hint" id="status"></div>
</div>
<div id="timebar">
  <button id="play" title="play/pause">&#9654;</button>
  <input type="range" id="slider" min="0" max="0" value="0" step="1">
  <span id="timelabel"></span>
</div>
<script>
"use strict";

const graph = /*GRAPH_DATA*/null;
const live = /*LIVE*/false;
const timeline = /*TIMELINE_DATA*/null;

const NODE_W = 130;
const NODE_H = 36;
const MARGIN_X = 110;
const MARGIN_Y = 80;
const CELL_W = 210;     // grid column pitch
const CELL_H = 90;      // grid row pitch
const CHANNEL_GAP = 10; // spacing between parallel edges sharing a channel
const CORNER_R = 10;    // rounded corner radius for orthogonal bends

const COLOR_ROOT = "#2563eb";
const COLOR_ROOT_FILL = "#dbeafe";
const COLOR_NODE = "#6b7280";
const COLOR_NODE_FILL = "#ffffff";
const COLOR_EDGE = "#9ca3af";
const COLOR_EDGE_HOVER = "#f59e0b";

let nodes = [];
let edges = [];
let hovered = null;

// Timeline state. history holds timestamped cumulative counters, either
// accumulated from SSE (live mode) or embedded at render time (--replay).
// cursorIdx is the viewed index; -1 follows the latest snapshot. view
// holds the rates derived for the current index, recomputed each frame.
let history = [];
let cursorIdx = -1;
let view = null;
let playing = false;
let lastAdvanceMs = 0;

const PLAYBACK_STEP_MS = 200;  // wall-clock time per snapshot during playback

const slider = document.getElementById("slider");
const playBtn = document.getElementById("play");
const timeLabel = document.getElementById("timelabel");

function setStatus(msg) {
  document.getElementById("status").textContent = msg;
}

function connectLive() {
  const es = new EventSource("/events");
  setStatus("live: connecting…");
  es.onopen = () => setStatus("live: connected");
  es.onerror = () => setStatus("live: disconnected (run ended?)");
  es.onmessage = ev => {
    history.push(JSON.parse(ev.data));
    updateTimebar();
  };
}

// viewAt derives per-service rates and error fractions at history index i
// from the delta against the previous snapshot.
function viewAt(i) {
  if (i < 0 || i >= history.length) return null;
  const cur = history[i];
  const prev = i > 0 ? history[i - 1] : null;
  const rates = {}, errPct = {};
  if (prev) {
    const dt = (cur.timestampMs - prev.timestampMs) / 1000;
    if (dt > 0) {
      for (const [name, s] of Object.entries(cur.services)) {
        const p = prev.services[name] || { spans: 0, errors: 0 };
        const d = s.spans - p.spans;
        rates[name] = d / dt;
        errPct[name] = d > 0 ? (s.errors - p.errors) / d : 0;
      }
    }
  }
  return { rates, errPct, totals: cur.services };
}

function currentIndex() {
  return cursorIdx === -1 ? history.length - 1 : Math.min(cursorIdx, history.length - 1);
}

function updateTimebar() {
  if (history.length === 0) return;
  slider.max = history.length - 1;
  const idx = currentIndex();
  slider.value = idx;
  const elapsed = (history[idx].timestampMs - history[0].timestampMs) / 1000;
  timeLabel.textContent = "+" + elapsed.toFixed(1) + "s" + (live && cursorIdx === -1 ? " (live)" : "");
}

function stopPlayback() {
  playing = false;
  playBtn.innerHTML = "&#9654;";
}

function initTimebar() {
  document.getElementById("timebar").style.display = "flex";

  slider.addEventListener("input", () => {
    stopPlayback();
    const v = Number(slider.value);
    cursorIdx = live && v >= history.length - 1 ? -1 : v;
    updateTimebar();
  });

  playBtn.addEventListener("click", () => {
    if (playing) {
      stopPlayback();
      return;
    }
    playing = true;
    playBtn.innerHTML = "&#10074;&#10074;";
    if (cursorIdx === -1) cursorIdx = 0;
    lastAdvanceMs = millis();
  });
}

function advancePlayback() {
  if (!playing || millis() - lastAdvanceMs < PLAYBACK_STEP_MS) return;
  lastAdvanceMs = millis();
  cursorIdx++;
  if (cursorIdx >= history.length - 1) {
    cursorIdx = live ? -1 : history.length - 1;
    stopPlayback();
  }
  updateTimebar();
}

function setup() {
  createCanvas(windowWidth, windowHeight);
  textFont("-apple-system, 'Segoe UI', Roboto, sans-serif");

  const nodeByID = {};
  nodes = graph.nodes.map(n => {
    const node = { ...n, px: 0, py: 0 };
    nodeByID[n.id] = node;
    return node;
  });
  edges = graph.edges.map(e => ({
    ...e,
    from: nodeByID[e.source],
    to: nodeByID[e.target],
  }));

  placeNodes();
  if (timeline) {
    history = timeline;
    cursorIdx = 0;
    setStatus("recorded run: " + ((history[history.length - 1].timestampMs - history[0].timestampMs) / 1000).toFixed(1) + "s");
  }
  if (live || timeline) initTimebar();
  if (live) connectLive();
  updateTimebar();
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  placeNodes();
}

// Grid state computed by placeNodes: pixel pitch (scaled to fit the
// window) and the origin of grid cell (0,0).
let cellW = CELL_W, cellH = CELL_H, gridX0 = 0, gridY0 = 0;

// Map integer grid coordinates onto the canvas: scale the cell pitch
// down if the grid would overflow the window, then centre the drawing.
function placeNodes() {
  const cols = Math.max(graph.gridCols - 1, 1);
  const rows = Math.max(graph.gridRows - 1, 1);
  const availW = Math.max(width - 2 * MARGIN_X, 1);
  const availH = Math.max(height - 2 * MARGIN_Y, 1);
  const scale = Math.min(1, availW / (cols * CELL_W), availH / (rows * CELL_H));
  cellW = CELL_W * scale;
  cellH = CELL_H * scale;
  const gridW = (graph.gridCols - 1) * cellW;
  const gridH = (graph.gridRows - 1) * cellH;
  gridX0 = (width - gridW) / 2;
  gridY0 = (height - gridH) / 2;
  for (const n of nodes) {
    n.px = gridX0 + n.col * cellW;
    n.py = gridY0 + n.row * cellH;
  }
  buildEdgePaths();
}

function edgeWidth(weight) {
  return 1 + 2.5 * Math.log(1 + weight);
}

function drawArrow(x, y, fromX, fromY, w, isHover) {
  const a = Math.atan2(y - fromY, x - fromX);
  const size = 7 + w;
  push();
  translate(x, y);
  rotate(a);
  noStroke();
  fill(isHover ? COLOR_EDGE_HOVER : COLOR_EDGE);
  triangle(0, 0, -size, -size / 2.2, -size, size / 2.2);
  pop();
}

// makePath wraps a polyline with cumulative segment lengths so pulses can
// be positioned by a single parameter. Consecutive duplicate points are
// dropped so rounded corners stay well-formed.
function makePath(rawPts) {
  const pts = [rawPts[0]];
  for (const p of rawPts.slice(1)) {
    const last = pts[pts.length - 1];
    if (Math.abs(p[0] - last[0]) > 0.01 || Math.abs(p[1] - last[1]) > 0.01) pts.push(p);
  }
  const lens = [0];
  let total = 0;
  for (let i = 1; i < pts.length; i++) {
    total += Math.hypot(pts[i][0] - pts[i - 1][0], pts[i][1] - pts[i - 1][1]);
    lens.push(total);
  }
  return { pts, lens, total };
}

// pointOnPath returns the position at parameter t in [0,1] along a path.
function pointOnPath(path, t) {
  const d = t * path.total;
  let i = 1;
  while (i < path.lens.length - 1 && path.lens[i] < d) i++;
  const segLen = path.lens[i] - path.lens[i - 1] || 1;
  const f = (d - path.lens[i - 1]) / segLen;
  const a = path.pts[i - 1], b = path.pts[i];
  return { x: a[0] + (b[0] - a[0]) * f, y: a[1] + (b[1] - a[1]) * f };
}

// buildEdgePaths computes an orthogonal polyline for every edge. Vertical
// segments run in the gaps between columns; edges spanning several columns
// travel along a horizontal lane between rows; same-column edges route
// through a channel right of the column; back edges route below the grid.
// Edges sharing a channel or lane are spread apart by CHANNEL_GAP.
function buildEdgePaths() {
  const specs = edges.map(e => {
    if (e.from === e.to) return { self: true, keys: [] };
    const sc = e.from.col, tc = e.to.col;
    if (tc > sc) {
      if (tc - sc === 1) return { kind: "fwd", keys: e.from.row === e.to.row ? [] : ["v" + tc] };
      return { kind: "long", keys: ["v" + (sc + 1), "lane" + Math.min(e.from.row, e.to.row), "v" + tc] };
    }
    if (tc === sc) return { kind: "same", keys: ["r" + sc] };
    return { kind: "back", keys: ["v" + tc, "bottom"] };
  });

  const counts = {}, claimed = {};
  for (const s of specs) for (const k of s.keys) counts[k] = (counts[k] || 0) + 1;
  const off = key => {
    claimed[key] = (claimed[key] || 0) + 1;
    return (claimed[key] - 1 - (counts[key] - 1) / 2) * CHANNEL_GAP;
  };
  const gapX = col => gridX0 + (col - 0.5) * cellW;

  edges.forEach((e, i) => {
    const spec = specs[i];
    if (spec.self) { e.path = null; return; }
    const s = e.from, t = e.to;
    const exitR = s.px + NODE_W / 2, entryL = t.px - NODE_W / 2, entryR = t.px + NODE_W / 2;
    let pts;
    if (spec.kind === "fwd") {
      if (s.row === t.row) {
        pts = [[exitR, s.py], [entryL, t.py]];
      } else {
        const x = gapX(t.col) + off("v" + t.col);
        pts = [[exitR, s.py], [x, s.py], [x, t.py], [entryL, t.py]];
      }
    } else if (spec.kind === "long") {
      const x1 = gapX(s.col + 1) + off("v" + (s.col + 1));
      const laneRow = Math.min(s.row, t.row);
      const laneY = gridY0 + (laneRow - 0.5) * cellH + off("lane" + laneRow);
      const x2 = gapX(t.col) + off("v" + t.col);
      pts = [[exitR, s.py], [x1, s.py], [x1, laneY], [x2, laneY], [x2, t.py], [entryL, t.py]];
    } else if (spec.kind === "same") {
      const x = Math.max(s.px, t.px) + NODE_W / 2 + 24 + off("r" + s.col);
      pts = [[exitR, s.py], [x, s.py], [x, t.py], [entryR, t.py]];
    } else {
      const x = gapX(t.col) + off("v" + t.col);
      const laneY = gridY0 + (graph.gridRows - 0.5) * cellH + off("bottom");
      pts = [[s.px, s.py + NODE_H / 2], [s.px, laneY], [x, laneY], [x, t.py], [entryL, t.py]];
    }
    e.path = makePath(pts);
  });
}

function drawEdge(e) {
  const touchesHover = hovered && (e.from === hovered || e.to === hovered);
  const w = edgeWidth(e.weight);

  stroke(touchesHover ? COLOR_EDGE_HOVER : COLOR_EDGE);
  strokeWeight(w);
  noFill();
  if (e.async) drawingContext.setLineDash([6, 6]);

  if (e.from === e.to) {
    // Self-call: loop above the node
    arc(e.from.px, e.from.py - NODE_H / 2, 50, 50, PI * 0.9, PI * 2.1);
    drawingContext.setLineDash([]);
    return;
  }

  const pts = e.path.pts;
  const ctx = drawingContext;
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  for (let i = 1; i < pts.length - 1; i++) {
    ctx.arcTo(pts[i][0], pts[i][1], pts[i + 1][0], pts[i + 1][1], CORNER_R);
  }
  ctx.lineTo(pts[pts.length - 1][0], pts[pts.length - 1][1]);
  ctx.stroke();
  ctx.setLineDash([]);

  const a = pts[pts.length - 2], b = pts[pts.length - 1];
  drawArrow(b[0], b[1], a[0], a[1], w, touchesHover);
}

const PULSE_SPEED = 0.5;  // edge traversals per second
const PULSE_MAX = 6;      // maximum concurrent pulses per edge

// drawEdgePulses animates dots travelling along an edge at a density
// reflecting the callee service's current span rate.
function drawEdgePulses(e) {
  if (e.from === e.to || !e.path) return;
  const rate = view.rates[e.target] || 0;
  if (rate <= 0) return;

  const n = constrain(Math.round(Math.sqrt(rate)), 1, PULSE_MAX);
  const errLevel = constrain((view.errPct[e.target] || 0) * 3, 0, 1);
  const dotColor = lerpColor(color("#2563eb"), color("#dc2626"), errLevel);
  const size = 5 + edgeWidth(e.weight) / 2;

  noStroke();
  fill(dotColor);
  for (let i = 0; i < n; i++) {
    const t = ((millis() / 1000) * PULSE_SPEED + i / n) % 1;
    const p = pointOnPath(e.path, t);
    circle(p.x, p.y, size);
  }
}

function drawNode(n) {
  const isHover = n === hovered;
  const errLevel = view ? constrain((view.errPct[n.id] || 0) * 3, 0, 1) : 0;
  const border = lerpColor(color(n.isRoot ? COLOR_ROOT : COLOR_NODE), color("#dc2626"), errLevel);
  stroke(border);
  strokeWeight(isHover ? 2.5 : 1.5);
  fill(n.isRoot ? COLOR_ROOT_FILL : COLOR_NODE_FILL);
  rectMode(CENTER);
  rect(n.px, n.py, NODE_W, NODE_H, 8);

  noStroke();
  fill("#1f2937");
  textAlign(CENTER, CENTER);
  textSize(12);
  textStyle(n.isRoot ? BOLD : NORMAL);
  if (view) {
    text(n.id, n.px, n.py - 7, NODE_W - 12, NODE_H / 2);
    textStyle(NORMAL);
    textSize(9);
    fill(errLevel > 0 ? border : "#6b7280");
    const rate = view.rates[n.id] || 0;
    const err = (view.errPct[n.id] || 0) * 100;
    text(rate.toFixed(1) + "/s · err " + err.toFixed(1) + "%", n.px, n.py + 8);
  } else {
    text(n.id, n.px, n.py, NODE_W - 12, NODE_H);
  }
  textStyle(NORMAL);
}

function drawTooltip(n) {
  const lines = [n.id + (n.isRoot ? "  (entry point)" : "")];
  if (view && view.totals[n.id]) {
    const t = view.totals[n.id];
    const avg = t.spans > 0 ? (t.durationMs / t.spans).toFixed(1) : "0";
    lines.push("  " + t.spans + " spans, " + t.errors + " errors, avg " + avg + " ms");
  }
  for (const op of n.operations) lines.push("  " + op);
  for (const e of edges) {
    if (e.from !== n) continue;
    for (const c of e.calls) {
      let label = "  " + c.from + " → " + e.target + "." + c.to;
      const mods = [];
      if (c.probability < 1) mods.push(Math.round(c.probability * 100) + "%");
      if (c.count > 1) mods.push("×" + c.count);
      if (c.async) mods.push("async");
      if (mods.length) label += "  [" + mods.join(", ") + "]";
      lines.push(label);
    }
  }

  textSize(11);
  textAlign(LEFT, TOP);
  let boxW = 0;
  for (const l of lines) boxW = Math.max(boxW, textWidth(l));
  boxW += 20;
  const boxH = lines.length * 16 + 12;
  let tx = n.px + NODE_W / 2 + 10;
  let ty = n.py - boxH / 2;
  tx = constrain(tx, 4, width - boxW - 4);
  ty = constrain(ty, 4, height - boxH - 4);

  stroke("#d1d5db");
  strokeWeight(1);
  fill(255, 255, 255, 242);
  rectMode(CORNER);
  rect(tx, ty, boxW, boxH, 6);

  noStroke();
  for (let i = 0; i < lines.length; i++) {
    fill(i === 0 ? "#111827" : "#4b5563");
    textStyle(i === 0 ? BOLD : NORMAL);
    text(lines[i], tx + 10, ty + 8 + i * 16);
  }
  textStyle(NORMAL);
}

function nodeAt(x, y) {
  for (let i = nodes.length - 1; i >= 0; i--) {
    const n = nodes[i];
    if (Math.abs(x - n.px) <= NODE_W / 2 && Math.abs(y - n.py) <= NODE_H / 2) return n;
  }
  return null;
}

function draw() {
  background("#fafafa");

  advancePlayback();
  view = viewAt(currentIndex());
  if (live && cursorIdx === -1) updateTimebar();

  hovered = nodeAt(mouseX, mouseY);
  cursor(hovered ? HAND : ARROW);

  for (const e of edges) drawEdge(e);
  if (view) for (const e of edges) drawEdgePulses(e);
  for (const n of nodes) drawNode(n);
  if (hovered) drawTooltip(hovered);
}
</script>
</body>
</html>
