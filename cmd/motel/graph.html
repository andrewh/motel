<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GRAPH_TITLE - motel topology</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.11.3/lib/p5.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background: #fafafa; }
  canvas { display: block; }
  #legend {
    position: fixed; top: 12px; left: 12px;
    font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
    font-size: 12px; color: #444;
    background: rgba(255, 255, 255, 0.9);
    border: 1px solid #ddd; border-radius: 6px;
    padding: 8px 12px; pointer-events: none;
  }
  #legend .title { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
  #legend .hint { color: #888; margin-top: 4px; }
</style>
</head>
<body>
<div id="legend">
  <div class="title">GRAPH_TITLE</div>
  <div>&#9632; entry point &nbsp; &#9633; service &nbsp; &#8943; async call</div>
  <div class="hint">hover a service for operations</div>
</div>
<script>
"use strict";

const graph = /*GRAPH_DATA*/null;

const NODE_W = 130;
const NODE_H = 36;
const MARGIN_X = 110;
const MARGIN_Y = 60;

const COLOR_ROOT = "#2563eb";
const COLOR_ROOT_FILL = "#dbeafe";
const COLOR_NODE = "#6b7280";
const COLOR_NODE_FILL = "#ffffff";
const COLOR_EDGE = "#9ca3af";
const COLOR_EDGE_HOVER = "#f59e0b";

let nodes = [];
let edges = [];
let hovered = null;

function setup() {
  createCanvas(windowWidth, windowHeight);
  textFont("-apple-system, 'Segoe UI', Roboto, sans-serif");

  const nodeByID = {};
  nodes = graph.nodes.map(n => {
    const node = { ...n, px: 0, py: 0 };
    nodeByID[n.id] = node;
    return node;
  });
  edges = graph.edges.map(e => ({
    ...e,
    from: nodeByID[e.source],
    to: nodeByID[e.target],
  }));

  placeNodes();
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  placeNodes();
}

// Map the normalised layout coordinates onto the canvas, leaving margins
// for node boxes and tooltips.
function placeNodes() {
  const w = Math.max(width - 2 * MARGIN_X, 1);
  const h = Math.max(height - 2 * MARGIN_Y, 1);
  for (const n of nodes) {
    n.px = MARGIN_X + n.x * w;
    n.py = MARGIN_Y + n.y * h;
  }
}

function edgeWidth(weight) {
  return 1 + 2.5 * Math.log(1 + weight);
}

// Clip the edge endpoint to the boundary of the node's rectangle so
// arrowheads sit on the node border rather than its centre.
function clipToNode(x1, y1, node) {
  const dx = x1 - node.px, dy = y1 - node.py;
  const sx = Math.abs(dx) > 0.01 ? (NODE_W / 2 + 6) / Math.abs(dx) : Infinity;
  const sy = Math.abs(dy) > 0.01 ? (NODE_H / 2 + 6) / Math.abs(dy) : Infinity;
  const s = Math.min(sx, sy, 1);
  return { x: node.px + dx * s, y: node.py + dy * s };
}

function drawArrow(x, y, fromX, fromY, w, isHover) {
  const a = Math.atan2(y - fromY, x - fromX);
  const size = 7 + w;
  push();
  translate(x, y);
  rotate(a);
  noStroke();
  fill(isHover ? COLOR_EDGE_HOVER : COLOR_EDGE);
  triangle(0, 0, -size, -size / 2.2, -size, size / 2.2);
  pop();
}

function drawEdge(e) {
  const touchesHover = hovered && (e.from === hovered || e.to === hovered);
  const w = edgeWidth(e.weight);

  stroke(touchesHover ? COLOR_EDGE_HOVER : COLOR_EDGE);
  strokeWeight(w);
  if (e.async) drawingContext.setLineDash([6, 6]);

  if (e.from === e.to) {
    // Self-call: loop above the node
    noFill();
    arc(e.from.px, e.from.py - NODE_H / 2, 50, 50, PI * 0.9, PI * 2.1);
    drawingContext.setLineDash([]);
    return;
  }

  const start = clipToNode(e.to.px, e.to.py, e.from);
  const end = clipToNode(e.from.px, e.from.py, e.to);

  // Bow edges that span more than one column so they do not run
  // straight through intermediate nodes.
  const span = Math.abs(e.to.x - e.from.x);
  const bow = span > 0.0001 && Math.abs(e.to.px - e.from.px) > NODE_W * 2.2
    ? Math.min(120, Math.abs(e.to.px - e.from.px) * 0.18)
    : 0;

  noFill();
  if (bow > 0) {
    const mx = (start.x + end.x) / 2;
    const my = (start.y + end.y) / 2;
    const dx = end.x - start.x, dy = end.y - start.y;
    const d = Math.max(Math.hypot(dx, dy), 1);
    const cx = mx - (dy / d) * bow;
    const cy = my + (dx / d) * bow;
    bezier(start.x, start.y, cx, cy, cx, cy, end.x, end.y);
    drawingContext.setLineDash([]);
    drawArrow(end.x, end.y, cx, cy, w, touchesHover);
  } else {
    line(start.x, start.y, end.x, end.y);
    drawingContext.setLineDash([]);
    drawArrow(end.x, end.y, start.x, start.y, w, touchesHover);
  }
}

function drawNode(n) {
  const isHover = n === hovered;
  stroke(n.isRoot ? COLOR_ROOT : COLOR_NODE);
  strokeWeight(isHover ? 2.5 : 1.5);
  fill(n.isRoot ? COLOR_ROOT_FILL : COLOR_NODE_FILL);
  rectMode(CENTER);
  rect(n.px, n.py, NODE_W, NODE_H, 8);

  noStroke();
  fill("#1f2937");
  textAlign(CENTER, CENTER);
  textSize(12);
  textStyle(n.isRoot ? BOLD : NORMAL);
  text(n.id, n.px, n.py, NODE_W - 12, NODE_H);
  textStyle(NORMAL);
}

function drawTooltip(n) {
  const lines = [n.id + (n.isRoot ? "  (entry point)" : "")];
  for (const op of n.operations) lines.push("  " + op);
  for (const e of edges) {
    if (e.from !== n) continue;
    for (const c of e.calls) {
      let label = "  " + c.from + " → " + e.target + "." + c.to;
      const mods = [];
      if (c.probability < 1) mods.push(Math.round(c.probability * 100) + "%");
      if (c.count > 1) mods.push("×" + c.count);
      if (c.async) mods.push("async");
      if (mods.length) label += "  [" + mods.join(", ") + "]";
      lines.push(label);
    }
  }

  textSize(11);
  textAlign(LEFT, TOP);
  let boxW = 0;
  for (const l of lines) boxW = Math.max(boxW, textWidth(l));
  boxW += 20;
  const boxH = lines.length * 16 + 12;
  let tx = n.px + NODE_W / 2 + 10;
  let ty = n.py - boxH / 2;
  tx = constrain(tx, 4, width - boxW - 4);
  ty = constrain(ty, 4, height - boxH - 4);

  stroke("#d1d5db");
  strokeWeight(1);
  fill(255, 255, 255, 242);
  rectMode(CORNER);
  rect(tx, ty, boxW, boxH, 6);

  noStroke();
  for (let i = 0; i < lines.length; i++) {
    fill(i === 0 ? "#111827" : "#4b5563");
    textStyle(i === 0 ? BOLD : NORMAL);
    text(lines[i], tx + 10, ty + 8 + i * 16);
  }
  textStyle(NORMAL);
}

function nodeAt(x, y) {
  for (let i = nodes.length - 1; i >= 0; i--) {
    const n = nodes[i];
    if (Math.abs(x - n.px) <= NODE_W / 2 && Math.abs(y - n.py) <= NODE_H / 2) return n;
  }
  return null;
}

function draw() {
  background("#fafafa");

  hovered = nodeAt(mouseX, mouseY);
  cursor(hovered ? HAND : ARROW);

  for (const e of edges) drawEdge(e);
  for (const n of nodes) drawNode(n);
  if (hovered) drawTooltip(hovered);
}
</script>
</body>
</html>
