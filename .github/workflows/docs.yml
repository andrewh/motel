name: docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'cmd/motel/README.md'
      - 'README.md'
      - 'LICENSE'
      - 'mkdocs.yml'
      - 'Makefile'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install 'mkdocs-material~=9.6'
      - run: make site
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
